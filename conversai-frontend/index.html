<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>ConversAI - Transform Text into Visual Explanations</title>
  <meta name="description"
    content="ConversAI converts long text into engaging visual explanations with AI-powered narration, timed visuals, and animated avatars." />
  <meta name="keywords" content="AI, explanation, visual, narration, education, learning" />

  <!-- Open Graph -->
  <meta property="og:title" content="ConversAI - Transform Text into Visual Explanations" />
  <meta property="og:description" content="Convert any text into an engaging visual explanation with AI narration." />
  <meta property="og:type" content="website" />

  <!-- Theme Color - Updated dynamically by theme -->
  <meta name="theme-color" content="#0f0f13" id="theme-color-meta" />

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Prevent flash of wrong theme (FOWT) -->
  <script>
    (function () {
      const STORAGE_KEY = 'conversai-theme';
      let theme = localStorage.getItem(STORAGE_KEY);

      // If no stored preference, check system preference
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }

      // Apply theme immediately
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;

      // Update theme-color meta for mobile browsers
      const themeColorMeta = document.getElementById('theme-color-meta');
      if (themeColorMeta) {
        themeColorMeta.content = theme === 'light' ? '#fafafa' : '#0f0f13';
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
